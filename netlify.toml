# ── BuildProposal · netlify.toml ──────────────────────────────────────────────
# Canonical: https://buildproposal.co

[build]
  publish = "."

# ── Bot Blocking (404 — give bots nothing) ────────────────────────────────────
[[redirects]]
  from   = "/wp-admin/*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/wordpress/*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/wp-login.php"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/xmlrpc.php"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/.env"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/.git/*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/meta.json"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/_next/*"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/config.php"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/admin/*"
  to     = "/404.html"
  status = 404
  force  = true

# ── Security Headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://pagead2.googlesyndication.com https://www.googletagmanager.com https://www.gstatic.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://pagead2.googlesyndication.com; connect-src 'self' https://pagead2.googlesyndication.com https://adtrafficquality.google https://firestore.googleapis.com https://identitytoolkit.googleapis.com; frame-src https://googleads.g.doubleclick.net https://tpc.googlesyndication.com https://vital-plating-422300-u2.firebaseapp.com; frame-ancestors 'self' https://vital-plating-422300-u2.web.app https://gigledger.co"
